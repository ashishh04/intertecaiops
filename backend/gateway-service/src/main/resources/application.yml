server:
  port: 9443
spring:
  application:
    name: gateway-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://localhost:8087/oauth2/jwks}
        opaque-token:
          introspection-uri: ${AUTH_INTROSPECTION_URI:http://localhost:8087/oauth/check_token}
          client-id: ${GATEWAY_CLIENT_ID:gateway}
          client-secret: ${GATEWAY_CLIENT_SECRET:gateway-secret}
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - http://localhost:*
              - http://127.0.0.1:*
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: auth
          uri: ${juviai.gateway.service-uris.auth}
          predicates:
            - Path=/auth/**
        - id: auth-api
          uri: ${juviai.gateway.service-uris.auth}
          predicates:
            - Path=/api/auth/**
        - id: user-designations
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/designations/**,/api/designations
        - id: user
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/users/**
        - id: user-admin
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/admin/**
        - id: user-roles
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/roles/**
        - id: org
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/organisations/**
        - id: org-b2b
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/b2b/**
        - id: org-departments
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/departments/**
        - id: org-bands
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/employeebands/**
        - id: org-states
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/states/**
        - id: org-countries
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/countries/**
        - id: org-cities
          uri: ${juviai.gateway.service-uris.user}
          predicates:
            - Path=/api/cities/**,/api/cities
        - id: placement
          uri: ${juviai.gateway.service-uris.placement}
          predicates:
            - Path=/api/placements/**,/api/openings/**,/api/openings
        - id: project
          uri: ${juviai.gateway.service-uris.project}
          predicates:
            - Path=/api/projects/**
        - id: product
          uri: ${juviai.gateway.service-uris.product}
          predicates:
            - Path=/api/products/**,/api/catalogs/**,/api/categories/**,/api/brands/**,/api/attributes/**,/api/prices/**,/api/inventory/**,/api/catalog-sync/**

        - id: commerce-orders
          uri: ${juviai.gateway.service-uris.commerce}
          predicates:
            - Path=/api/orders,/api/orders/**
        - id: commerce-carts
          uri: ${juviai.gateway.service-uris.commerce}
          predicates:
            - Path=/api/carts,/api/carts/**
        - id: commerce
          uri: ${juviai.gateway.service-uris.commerce}
          predicates:
            - Path=/api/stores,/api/stores/**,/api/sites,/api/sites/**,/api/warehouses,/api/warehouses/**,/api/currencies,/api/currencies/**,/api/languages,/api/languages/**,/api/appointments/**
        - id: wallet
          uri: ${juviai.gateway.service-uris.wallet}
          predicates:
            - Path=/api/wallet/**
        - id: expense
          uri: ${juviai.gateway.service-uris.expense}
          predicates:
            - Path=/api/expenses/**,/api/expense-categories/**
        - id: promotion
          uri: ${juviai.gateway.service-uris.promotion}
          predicates:
            - Path=/api/promotions,/api/promotions/**

        - id: fulfillment
          uri: ${juviai.gateway.service-uris.fulfillment}
          predicates:
            - Path=/api/agents/**,/api/assignments/**,/api/delivery-zones/**,/api/delivery-partners/**,/api/shipment-tracking/**,/api/fulfillment/**,/api/public/agents/**
      default-filters:
        - RemoveRequestHeader=Cookie
juviai:
  gateway:
    shared-secret: ${JUVIAI_GATEWAY_SHARED_SECRET:default-insecure-secret-replace-in-prod}
    enforce-signature: ${JUVIAI_GATEWAY_ENFORCE_SIGNATURE:false}
    service-uris:
      auth: ${AUTH_SERVICE_URL:http://localhost:8087}
      user: ${USER_SERVICE_URL:http://localhost:8081}
      placement: ${PLACEMENT_SERVICE_URL:http://localhost:8083}
      project: ${PROJECT_SERVICE_URL:http://localhost:8089}
      product: ${PRODUCT_SERVICE_URL:http://localhost:8091}
      commerce: ${COMMERCE_SERVICE_URL:http://localhost:8096}
      wallet: ${WALLET_SERVICE_URL:http://localhost:8084}
      expense: ${EXPENSE_SERVICE_URL:http://localhost:8088}
      promotion: ${PROMOTION_SERVICE_URL:http://localhost:8092}
      fulfillment: ${FULFILLMENT_SERVICE_URL:http://localhost:8097}
    check-token-cache-ttl-seconds: 30
    introspection:
      enabled: false
management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
