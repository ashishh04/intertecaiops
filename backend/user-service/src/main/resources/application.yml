server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3306/juviai_user?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8087/oauth2/jwks

  mail:
    host: smtp.gmail.com
    port: 587
    username: hltsolutions.info@gmail.com
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

juviai:
  crypto:
    keyvault:
      validate-on-startup: false
      url: ${JUVIAI_KEYVAULT_URL:https://juviai-keyvault.vault.azure.net}
      key-name: ${JUVIAI_KEYVAULT_KEY_NAME:juviai-bank-key}
      key-version: ${JUVIAI_KEYVAULT_KEY_VERSION:}
  gateway:
    check-token-cache-ttl-seconds: 30
    shared-secret: ${JUVIAI_GATEWAY_SHARED_SECRET:default-insecure-secret-replace-in-prod}
    enforce-signature: ${JUVIAI_GATEWAY_ENFORCE_SIGNATURE:false}
  coins:
    education:
      perAction: 10
      maxPerCategory: 30
    project:
      perAction: 10
      maxPerCategory: 50
    internship:
      perAction: 10
      maxPerCategory: 50
    skill:
      perAction: 2
      maxPerCategory: 40
    title:
      perAction: 5
      maxPerCategory: 25
  field-encryption:
    key: ${JUVIAI_FIELD_ENC_KEY:}
  field-hash:
    key: ${JUVIAI_FIELD_HASH_KEY:${JUVIAI_FIELD_ENC_KEY:}}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

eureka:
  client:
    enabled: false


# ── Field-level PII encryption ────────────────────────────────────────────────
# Generate key with: openssl rand -base64 32
# Set via environment variable: JUVIAI_FIELD_ENC_KEY=<base64-key>
# If not set, encryption is disabled (plaintext stored — acceptable for local dev only)
