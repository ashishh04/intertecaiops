server:
  port: 8080

spring:
  application:
    name: juviai-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: agent-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/agents/**

        - id: chat-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/chat/**

        - id: analytics-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/analytics/**

        - id: ai-core
          uri: http://localhost:8000
          predicates:
            - Path=/api/ai/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "https://juviai.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2000
    redis:
      repositories:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
